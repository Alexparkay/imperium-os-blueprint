<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="190" viewBox="0 0 1200 190" role="img" aria-label="Install flow: clone, say hello, interview, connect, first skills, compounding daily use">
  <rect width="1200" height="190" rx="14" fill="#F4F1EA"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#998574"/>
    </marker>
  </defs>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <!-- 6 steps -->
    <g>
      <rect x="40" y="52" width="160" height="78" rx="12" fill="#11462C"/>
      <text x="120" y="86" fill="#F4F1EA" font-size="15" font-weight="bold">Clone the repo</text>
      <text x="120" y="108" fill="#C4AD96" font-size="12">2 minutes</text>
    </g>
    <line x1="204" y1="91" x2="226" y2="91" stroke="#998574" stroke-width="2" marker-end="url(#arr)"/>
    <g>
      <rect x="232" y="52" width="160" height="78" rx="12" fill="#FCFAF4" stroke="#C4AD96"/>
      <text x="312" y="80" fill="#11462C" font-size="14" font-weight="bold">Say the magic line</text>
      <text x="312" y="100" fill="#553F28" font-size="11" font-style="italic">"I've just installed</text>
      <text x="312" y="114" fill="#553F28" font-size="11" font-style="italic">this, let's start"</text>
    </g>
    <line x1="396" y1="91" x2="418" y2="91" stroke="#998574" stroke-width="2" marker-end="url(#arr)"/>
    <g>
      <rect x="424" y="52" width="160" height="78" rx="12" fill="#FCFAF4" stroke="#C4AD96"/>
      <text x="504" y="80" fill="#11462C" font-size="14" font-weight="bold">It interviews you</text>
      <text x="504" y="100" fill="#553F28" font-size="11">your business, your voice,</text>
      <text x="504" y="114" fill="#553F28" font-size="11">your privacy lines</text>
    </g>
    <line x1="588" y1="91" x2="610" y2="91" stroke="#998574" stroke-width="2" marker-end="url(#arr)"/>
    <g>
      <rect x="616" y="52" width="160" height="78" rx="12" fill="#FCFAF4" stroke="#C4AD96"/>
      <text x="696" y="80" fill="#11462C" font-size="14" font-weight="bold">Connect your tools</text>
      <text x="696" y="100" fill="#553F28" font-size="11">one at a time,</text>
      <text x="696" y="114" fill="#553F28" font-size="11">each one verified</text>
    </g>
    <line x1="780" y1="91" x2="802" y2="91" stroke="#998574" stroke-width="2" marker-end="url(#arr)"/>
    <g>
      <rect x="808" y="52" width="160" height="78" rx="12" fill="#FCFAF4" stroke="#C4AD96"/>
      <text x="888" y="80" fill="#11462C" font-size="14" font-weight="bold">First skills, live</text>
      <text x="888" y="100" fill="#553F28" font-size="11">3-5 weekly tasks,</text>
      <text x="888" y="114" fill="#553F28" font-size="11">each run for real</text>
    </g>
    <line x1="972" y1="91" x2="994" y2="91" stroke="#998574" stroke-width="2" marker-end="url(#arr)"/>
    <g>
      <rect x="1000" y="52" width="160" height="78" rx="12" fill="#11462C"/>
      <text x="1080" y="86" fill="#F4F1EA" font-size="15" font-weight="bold">It compounds</text>
      <text x="1080" y="108" fill="#C4AD96" font-size="12">sharper every week</text>
    </g>
  </g>
  <text x="600" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#998574">about an hour of your attention, in chunks · stop anytime, resume with "continue onboarding"</text>
</svg>
