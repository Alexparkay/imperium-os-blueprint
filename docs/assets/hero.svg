<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-label="Imperium OS — an AI operating system for your company">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D3A25"/>
      <stop offset="1" stop-color="#11462C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C4AD96" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#C4AD96" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- constellation: the system map as quiet background -->
  <g stroke="#C4AD96" stroke-opacity="0.22" fill="none">
    <path d="M 920 80 L 1020 130 L 1100 90"/>
    <path d="M 1020 130 L 1060 210 L 980 250"/>
    <path d="M 1020 130 L 920 200"/>
    <path d="M 80 250 L 160 210 L 240 260"/>
    <path d="M 160 210 L 150 120"/>
  </g>
  <g fill="#C4AD96">
    <circle cx="920" cy="80" r="4" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="130" r="6" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="90" r="3" opacity="0.5"/>
    <circle cx="1060" cy="210" r="4" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="250" r="3" opacity="0.5"/>
    <circle cx="920" cy="200" r="3" opacity="0.4"/>
    <circle cx="80" cy="250" r="3" opacity="0.4"/>
    <circle cx="160" cy="210" r="5" opacity="0.7"><animate attributeName="opacity" values="0.7;0.25;0.7" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="240" cy="260" r="3" opacity="0.5"/>
    <circle cx="150" cy="120" r="3" opacity="0.4"/>
  </g>

  <ellipse cx="600" cy="170" rx="420" ry="170" fill="url(#glow)"/>

  <!-- wordmark -->
  <text x="600" y="142" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" letter-spacing="14" fill="#F4F1EA">IMPERIUM OS</text>
  <rect x="450" y="166" width="300" height="1.5" fill="#C4AD96" opacity="0.8"/>
  <text x="600" y="200" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-style="italic" fill="#C4AD96">An AI operating system for your company</text>

  <!-- the install line, typed -->
  <g font-family="ui-monospace, 'Courier New', monospace" font-size="16">
    <rect x="400" y="232" width="400" height="42" rx="8" fill="#0A2E1D" stroke="#C4AD96" stroke-opacity="0.35"/>
    <text x="420" y="259" fill="#7da78f">&gt;</text>
    <text x="440" y="259" fill="#F4F1EA">I've just installed this, let's start</text>
    <rect x="758" y="244" width="9" height="18" fill="#C4AD96">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="600" y="312" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="3" fill="#998574">CLONE IT · OPEN CLAUDE CODE · SAY HELLO · IT BUILDS ITSELF AROUND YOU</text>
</svg>
