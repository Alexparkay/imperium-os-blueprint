<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="150" viewBox="0 0 1200 150" role="img" aria-label="The eight onboarding phases">
  <rect width="1200" height="150" rx="14" fill="#11462C"/>
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <line x1="100" y1="62" x2="1100" y2="62" stroke="#C4AD96" stroke-opacity="0.4" stroke-width="2"/>
    <g>
      <circle cx="100" cy="62" r="17" fill="#C4AD96"/><text x="100" y="67" font-size="14" font-weight="bold" fill="#11462C">0</text>
      <text x="100" y="105" font-size="12" fill="#F4F1EA">Welcome</text><text x="100" y="121" font-size="10" fill="#998574">the tour</text>
    </g>
    <g>
      <circle cx="243" cy="62" r="17" fill="#C4AD96"/><text x="243" y="67" font-size="14" font-weight="bold" fill="#11462C">1</text>
      <text x="243" y="105" font-size="12" fill="#F4F1EA">Identity</text><text x="243" y="121" font-size="10" fill="#998574">+ privacy list</text>
    </g>
    <g>
      <circle cx="386" cy="62" r="17" fill="#C4AD96"/><text x="386" y="67" font-size="14" font-weight="bold" fill="#11462C">2</text>
      <text x="386" y="105" font-size="12" fill="#F4F1EA">Business</text><text x="386" y="121" font-size="10" fill="#998574">7-question interview</text>
    </g>
    <g>
      <circle cx="529" cy="62" r="17" fill="#C4AD96"/><text x="529" y="67" font-size="14" font-weight="bold" fill="#11462C">3</text>
      <text x="529" y="105" font-size="12" fill="#F4F1EA">Voice</text><text x="529" y="121" font-size="10" fill="#998574">sounds like you</text>
    </g>
    <g>
      <circle cx="672" cy="62" r="17" fill="#C4AD96"/><text x="672" y="67" font-size="14" font-weight="bold" fill="#11462C">4</text>
      <text x="672" y="105" font-size="12" fill="#F4F1EA">Connections</text><text x="672" y="121" font-size="10" fill="#998574">verified one by one</text>
    </g>
    <g>
      <circle cx="815" cy="62" r="17" fill="#C4AD96"/><text x="815" y="67" font-size="14" font-weight="bold" fill="#11462C">5</text>
      <text x="815" y="105" font-size="12" fill="#F4F1EA">First skills</text><text x="815" y="121" font-size="10" fill="#998574">run for real</text>
    </g>
    <g>
      <circle cx="958" cy="62" r="17" fill="#C4AD96"/><text x="958" y="67" font-size="14" font-weight="bold" fill="#11462C">6</text>
      <text x="958" y="105" font-size="12" fill="#F4F1EA">Cadence</text><text x="958" y="121" font-size="10" fill="#998574">memory seeded</text>
    </g>
    <g>
      <circle cx="1100" cy="62" r="17" fill="#F4F1EA"/><text x="1100" y="67" font-size="14" font-weight="bold" fill="#11462C">7</text>
      <text x="1100" y="105" font-size="12" fill="#F4F1EA">Graduation</text><text x="1100" y="121" font-size="10" fill="#998574">health baseline</text>
    </g>
  </g>
</svg>
