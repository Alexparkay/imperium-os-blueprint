<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Architecture: you talk to the brain; the brain reads and writes context, memory, skills, rules, automations and connectors">
  <rect width="1200" height="420" rx="14" fill="#F4F1EA"/>
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#998574"/>
    </marker>
  </defs>

  <g font-family="Arial, Helvetica, sans-serif">
    <!-- YOU -->
    <rect x="60" y="160" width="180" height="100" rx="14" fill="#11462C"/>
    <text x="150" y="202" text-anchor="middle" fill="#F4F1EA" font-size="20" font-weight="bold">You</text>
    <text x="150" y="228" text-anchor="middle" fill="#C4AD96" font-size="12">plain English, any mess,</text>
    <text x="150" y="243" text-anchor="middle" fill="#C4AD96" font-size="12">voice rambles welcome</text>

    <!-- BRAIN -->
    <rect x="380" y="140" width="240" height="140" rx="16" fill="#0D3A25"/>
    <text x="500" y="190" text-anchor="middle" fill="#F4F1EA" font-size="20" font-weight="bold">The brain</text>
    <text x="500" y="216" text-anchor="middle" fill="#C4AD96" font-size="12">Claude Code, run in your editor</text>
    <text x="500" y="234" text-anchor="middle" fill="#C4AD96" font-size="12">reads everything, does the work,</text>
    <text x="500" y="252" text-anchor="middle" fill="#C4AD96" font-size="12">never sends without approval</text>

    <line x1="244" y1="195" x2="372" y2="195" stroke="#998574" stroke-width="2" marker-end="url(#a2)"/>
    <line x1="372" y1="228" x2="244" y2="228" stroke="#998574" stroke-width="2" marker-end="url(#a2)"/>
    <text x="308" y="186" text-anchor="middle" fill="#553F28" font-size="11">you ask</text>
    <text x="308" y="248" text-anchor="middle" fill="#553F28" font-size="11">it ships</text>

    <!-- right column: the six organs -->
    <g font-size="13">
      <line x1="624" y1="170" x2="746" y2="78" stroke="#C4AD96" stroke-width="1.5"/>
      <line x1="624" y1="190" x2="746" y2="142" stroke="#C4AD96" stroke-width="1.5"/>
      <line x1="624" y1="210" x2="746" y2="206" stroke="#C4AD96" stroke-width="1.5"/>
      <line x1="624" y1="230" x2="746" y2="270" stroke="#C4AD96" stroke-width="1.5"/>
      <line x1="624" y1="250" x2="746" y2="334" stroke="#C4AD96" stroke-width="1.5"/>

      <rect x="750" y="56" width="390" height="48" rx="10" fill="#FCFAF4" stroke="#C4AD96"/>
      <text x="770" y="76" fill="#11462C" font-weight="bold">context/</text>
      <text x="770" y="93" fill="#553F28" font-size="11">the one-page truth about your company, read every session</text>

      <rect x="750" y="120" width="390" height="48" rx="10" fill="#FCFAF4" stroke="#C4AD96"/>
      <text x="770" y="140" fill="#11462C" font-weight="bold">memory/</text>
      <text x="770" y="157" fill="#553F28" font-size="11">people, decisions, tasks, dates - filed the moment you say them</text>

      <rect x="750" y="184" width="390" height="48" rx="10" fill="#FCFAF4" stroke="#C4AD96"/>
      <text x="770" y="204" fill="#11462C" font-weight="bold">44 skills + rules + hooks</text>
      <text x="770" y="221" fill="#553F28" font-size="11">pre-built workflows, quality enforcement, guardrails that can't be skipped</text>

      <rect x="750" y="248" width="390" height="48" rx="10" fill="#FCFAF4" stroke="#C4AD96"/>
      <text x="770" y="268" fill="#11462C" font-weight="bold">connectors</text>
      <text x="770" y="285" fill="#553F28" font-size="11">GitHub backup, Google Workspace, YouTube research, phone notifications...</text>

      <rect x="750" y="312" width="390" height="48" rx="10" fill="#FCFAF4" stroke="#C4AD96"/>
      <text x="770" y="332" fill="#11462C" font-weight="bold">self-maintenance</text>
      <text x="770" y="349" fill="#553F28" font-size="11">a registry + lint that catch drift before you do</text>
    </g>

    <!-- ownership strip -->
    <rect x="60" y="330" width="560" height="50" rx="10" fill="#11462C" opacity="0.06"/>
    <text x="80" y="350" fill="#11462C" font-size="13" font-weight="bold">You own all of it.</text>
    <text x="80" y="368" fill="#553F28" font-size="12">Plain files, on your machine, backed up to YOUR private GitHub. No platform, no lock-in.</text>
  </g>
</svg>
